#
# elmas-diary - Elma's Diary theme (320x240x16)
# Deep oxblood leather palette inspired by Yorushika's Elma diary cover.
#
# Install:
#   elmas-diary.cfg  ->  /.rockbox/themes/elmas-diary.cfg
#   elmas-diary.wps  ->  /.rockbox/wps/elmas-diary.wps
#   elmas-diary.sbs  ->  /.rockbox/wps/elmas-diary.sbs
#   *.bmp            ->  /.rockbox/wps/elmas-diary/
#
wps: /.rockbox/wps/elmas-diary.wps
sbs: /.rockbox/wps/elmas-diary.sbs
font: /.rockbox/fonts/13-Sazanami-Mincho.fnt
backdrop: /.rockbox/wps/elmas-diary/backdrop.bmp
statusbar: custom
iconset: /.rockbox/icons/elmas-diary-icons.bmp
viewers iconset: /.rockbox/icons/elmas-diary-viewers.bmp
foreground color: F0E8DC
background color: 221013
line selector start color: 8B6F47
line selector end color: 6B5235
line selector text color: F0E8DC
selector type: bar (gradient)
show icons: on
playlist viewer icons: on
list separator height: 0
scrollbar: off
#
# Peak meters: tuned across Ado opus + Yorushika FLAC/opus (see scripts/analyze-peaks.py)
# Log scale; -18 dB floor → quiet intros ~25–55%, chorus peaks near 0 dB
peak meter dbfs: on
peak meter min: 18
peak meter max: 0
